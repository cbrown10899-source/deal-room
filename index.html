<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#0d0d0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Deal Room">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%232a78d6'/%3E%3Ctext x='256' y='340' font-family='system-ui,sans-serif' font-size='260' font-weight='700' fill='%23fff' text-anchor='middle'%3EDR%3C/text%3E%3C/svg%3E">
<title>Deal Room</title>
<style>
  :root {
    color-scheme: light;
    --page:      #f9f9f7;
    --surface:   #fcfcfb;
    --ink:       #0b0b0b;
    --ink-2:     #52514e;
    --muted:     #898781;
    --hairline:  #e1e0d9;
    --border:    rgba(11,11,11,0.10);
    --track:     #f0efec;
    --series-1:  #2a78d6;
    --series-2:  #1baf7a;
    --good:      #0ca30c;
    --warning:   #fab219;
    --serious:   #ec835a;
    --critical:  #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page:      #0d0d0d;
      --surface:   #1a1a19;
      --ink:       #ffffff;
      --ink-2:     #c3c2b7;
      --muted:     #898781;
      --hairline:  #2c2c2a;
      --border:    rgba(255,255,255,0.10);
      --track:     #383835;
      --series-1:  #3987e5;
      --series-2:  #199e70;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--page);
    color: var(--ink);
    font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding-bottom: 4rem;
    -webkit-text-size-adjust: 100%;
  }
  header.topbar {
    position: sticky; top: 0; z-index: 20;
    background: var(--page);
    border-bottom: 1px solid var(--hairline);
    padding: .7rem 1rem; padding-top: calc(.7rem + env(safe-area-inset-top));
    display: flex; align-items: center; gap: .75rem;
  }
  .brand { font-weight: 700; letter-spacing: .01em; cursor: pointer; user-select: none; }
  .brand small { display: block; font-size: .68rem; font-weight: 400; color: var(--muted); letter-spacing: .02em; }
  .topbar .spacer { flex: 1; }
  main { max-width: 820px; margin: 0 auto; padding: 1rem; }

  .btn {
    font: inherit; font-size: .9rem; cursor: pointer;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--ink);
    padding: .55rem .9rem;
  }
  .btn:hover { border-color: var(--muted); }
  .btn.primary { background: var(--series-1); border-color: var(--series-1); color: #fff; }
  .btn.danger  { color: var(--critical); border-color: var(--critical); background: transparent; }
  .btn.small   { font-size: .8rem; padding: .3rem .65rem; }
  .btn.ghost   { border-color: transparent; background: transparent; color: var(--ink-2); }
  .btn.ghost:hover { border-color: var(--border); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  details.card > summary { list-style: none; }
  details.card > summary::-webkit-details-marker { display: none; }
  h1 { font-size: 1.35rem; margin: .2rem 0 1rem; }
  h2 { font-size: 1.05rem; margin: 0 0 .6rem; }
  h3 { font-size: .95rem; margin: 0 0 .4rem; }
  p.hint, .hint { color: var(--muted); font-size: .82rem; }

  label.field { display: block; margin-bottom: .8rem; font-size: .85rem; color: var(--ink-2); }
  label.field > span { display: block; margin-bottom: .25rem; font-weight: 600; color: var(--ink); }
  input[type=text], input[type=password], select, textarea {
    font: inherit; width: 100%;
    font-size: 16px;   /* keep ≥16px so iOS Safari doesn't auto-zoom the page on focus */
    background: var(--page); color: var(--ink);
    border: 1px solid var(--border); border-radius: 8px;
    padding: .6rem .7rem;
  }
  textarea { min-height: 6rem; resize: vertical; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--series-1); outline-offset: 1px; }

  .deal-row {
    display: flex; align-items: center; gap: .8rem;
    padding: .85rem .2rem; border-bottom: 1px solid var(--hairline); cursor: pointer;
  }
  .deal-row:last-child { border-bottom: none; }
  .deal-row:hover { background: var(--track); border-radius: 8px; }
  .deal-row .deal-name { font-weight: 600; }
  .deal-row .deal-sub { font-size: .8rem; color: var(--muted); }

  .chip {
    display: inline-block; font-size: .74rem; font-weight: 600;
    border: 1px solid var(--border); border-radius: 999px;
    padding: .12rem .55rem; color: var(--ink-2); white-space: nowrap;
  }
  .grade-pill {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 2.3rem; height: 2.3rem; padding: 0 .4rem; margin-left: auto;
    border-radius: 8px; font-weight: 700; font-size: 1.05rem; color: #fff; flex: none;
  }
  .grade-pill.g-A { background: var(--good); }
  .grade-pill.g-B { background: var(--warning); color: #0b0b0b; }
  .grade-pill.g-C { background: var(--serious); color: #0b0b0b; }
  .grade-pill.g-D, .grade-pill.g-F { background: var(--critical); }
  .grade-pill.g-none { background: var(--track); color: var(--muted); font-size: .8rem; }

  /* dropzone */
  .dropzone {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 1.7rem 1rem; text-align: center; color: var(--ink-2);
    cursor: pointer; transition: border-color .15s, background .15s; margin-bottom: .8rem;
  }
  .dropzone:hover { border-color: var(--muted); }
  .dropzone.drag { border-color: var(--series-1); background: color-mix(in srgb, var(--series-1) 8%, transparent); }
  .dropzone .dz-big { font-weight: 600; color: var(--ink); display: block; margin-bottom: .15rem; }

  ol.steps { margin: .2rem 0 0; padding-left: 1.2rem; }
  ol.steps > li { margin-bottom: .9rem; }

  .meter { display: flex; align-items: center; gap: .6rem; margin: .3rem 0; }
  .meter .m-label { flex: 0 0 9.5rem; font-size: .82rem; color: var(--ink-2); }
  .meter .m-track { flex: 1; height: 10px; background: var(--track); border-radius: 4px; overflow: hidden; }
  .meter .m-fill  { display: block; height: 100%; border-radius: 0 4px 4px 0; background: var(--series-1); }
  .meter .m-val { flex: 0 0 2.6rem; text-align: right; font-size: .82rem; font-variant-numeric: tabular-nums; color: var(--ink-2); }

  .verdict {
    display: flex; align-items: center; gap: .9rem;
    padding: .9rem 1rem; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface); margin-bottom: 1rem;
  }
  .verdict .v-text b { display: block; }
  .verdict .v-text .hint { margin: 0; }
  .flagbox { border: 1px solid var(--critical); border-radius: 10px; padding: .6rem .8rem; margin: .8rem 0; font-size: .85rem; }
  .flagbox b { color: var(--critical); }

  .crit { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; padding: .5rem 0; border-bottom: 1px solid var(--hairline); }
  .crit:last-child { border-bottom: none; }
  .crit .crit-label { flex: 1 1 14rem; font-size: .9rem; }
  .crit .crit-hint { display: block; font-size: .75rem; color: var(--muted); }

  table.cmp { width: 100%; border-collapse: collapse; font-size: .85rem; }
  table.cmp td { text-align: left; padding: .45rem .5rem; border-bottom: 1px solid var(--hairline); vertical-align: top; }

  .file-row { display: flex; align-items: center; gap: .7rem; padding: .55rem 0; border-bottom: 1px solid var(--hairline); }
  .file-row:last-child { border-bottom: none; }
  .file-row .f-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: .9rem; }
  .file-row .f-meta { font-size: .75rem; color: var(--muted); flex: none; }

  .empty { text-align: center; color: var(--muted); padding: 2.5rem 1rem; }
  .row { display: flex; gap: .6rem; flex-wrap: wrap; align-items: center; }
  .toast {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(1.2rem + env(safe-area-inset-bottom));
    background: var(--ink); color: var(--page);
    padding: .5rem .9rem; border-radius: 999px; font-size: .85rem;
    opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 50; max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; }
  body.locked #lockBtn, body.locked #gearBtn { display: none; }
  #exitDemoBtn { display: none; }
  body.demo #exitDemoBtn { display: inline-block; }
  body.demo #lockBtn, body.demo #gearBtn { display: none; }
  .demo-banner { background: color-mix(in srgb, var(--series-1) 12%, transparent); border: 1px solid var(--series-1); border-radius: 12px; padding: .7rem .9rem; margin-bottom: 1rem; font-size: .85rem; }
  .demo-cta { text-align: center; border-color: var(--series-1); }
  .demo-cta h2 { margin: 0 0 .15rem; }
  .demo-cta .dc-sub { color: var(--muted); font-size: .82rem; margin: 0 0 .8rem; }
  .demo-preview { text-align: left; border: 1px solid var(--hairline); border-radius: 10px; padding: .1rem .7rem; margin-bottom: .9rem; background: var(--page); }
  .dp-head { font-size: .72rem; color: var(--muted); font-weight: 600; letter-spacing: .02em; padding: .5rem 0 .35rem; border-bottom: 1px solid var(--hairline); }
  .dp-row { display: flex; align-items: center; gap: .5rem; padding: .48rem 0; border-bottom: 1px solid var(--hairline); }
  .dp-row:last-child { border-bottom: none; }
  .dp-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: .85rem; font-weight: 600; }
  .dp-type { display: block; font-size: .7rem; color: var(--muted); font-weight: 400; }
  .dp-pill { flex: none; width: 1.55rem; height: 1.55rem; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .82rem; color: #fff; }
  .dp-pill.g-A { background: var(--good); } .dp-pill.g-B { background: var(--warning); color: #0b0b0b; }
  .dp-pill.g-C { background: var(--serious); color: #0b0b0b; } .dp-pill.g-D, .dp-pill.g-F { background: var(--critical); }
  .grade-key { margin: 0 0 1rem; }
  .grade-key summary { cursor: pointer; color: var(--series-1); font-size: .82rem; list-style: none; }
  .grade-key summary::-webkit-details-marker { display: none; }
  .gk-row { display: flex; align-items: center; gap: .55rem; padding: .3rem 0; font-size: .85rem; }
  .gk-row .dp-pill { width: 1.4rem; height: 1.4rem; font-size: .78rem; }
  .gate { max-width: 26rem; margin: 2.5rem auto; }
  /* present for password managers, invisible to people (display:none would be ignored by managers) */
  .pm-user { position: absolute; left: -9999px; top: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  .reliability { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; margin: -.3rem 0 1rem; }
  .rel-badge { font-size: .74rem; font-weight: 700; border: 1px solid; border-radius: 999px; padding: .12rem .55rem; }
  @media (max-width: 540px) {
    .meter .m-label { flex-basis: 7.5rem; }
    main { padding: .75rem; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand" onclick="go('pipeline')">Deal Room<small>private deal vetting</small></div>
  <div class="spacer"></div>
  <button class="btn small" id="exitDemoBtn" onclick="exitDemo()">Exit demo</button>
  <button class="btn ghost" id="lockBtn" onclick="lockNow()" title="Lock">🔒</button>
  <button class="btn ghost" id="gearBtn" onclick="go('settings')" title="Settings">⚙︎</button>
</header>

<main id="app"></main>
<div class="toast" id="toast"></div>

<input type="file" id="fileAttach" hidden multiple>
<input type="file" id="fileImportBackup" hidden accept=".json,application/json">

<script>
"use strict";

/* ================= Family-office scorecard framework ================= */

const CATEGORIES = [
  { id: "people", name: "The People", blurb: "Family offices underwrite the operator before the deal.",
    criteria: [
      { id: "track",   name: "Track record",            hint: "1 = first attempt, unverifiable · 5 = has done exactly this before, results you can verify" },
      { id: "skin",    name: "Skin in the game",        hint: "1 = other people's money only · 5 = meaningful personal capital at risk alongside yours" },
      { id: "integ",   name: "Integrity & references",  hint: "1 = only sponsor-supplied references · 5 = independent references and background check out clean" },
      { id: "transp",  name: "Transparency",            hint: "1 = stories and deflection · 5 = answers hard questions with documents and data" },
    ]},
  { id: "business", name: "Business & Market", blurb: "Would this business exist and thrive without the pitch?",
    criteria: [
      { id: "demand",  name: "Demand durability",       hint: "1 = fad or hype-driven · 5 = need that persists through a downturn" },
      { id: "moat",    name: "Competitive moat",        hint: "1 = anyone can copy it tomorrow · 5 = durable advantage (brand, contracts, location, switching costs)" },
      { id: "market",  name: "Market size & headroom",  hint: "1 = tiny or shrinking market · 5 = large market with room to grow" },
      { id: "unit",    name: "Unit economics",          hint: "1 = loses money per unit, unclear path · 5 = clearly profitable per unit today" },
    ]},
  { id: "financials", name: "The Financials", blurb: "Numbers you can verify beat projections you're shown.",
    criteria: [
      { id: "revq",    name: "Revenue quality",         hint: "1 = one-off, concentrated in one customer · 5 = recurring, diversified, contracted" },
      { id: "cash",    name: "Margins & cash flow",     hint: "1 = thin margins, earnings not backed by cash · 5 = strong margins, real free cash flow (quality of earnings holds up)" },
      { id: "balance", name: "Balance sheet & leverage",hint: "1 = heavily levered, fragile · 5 = conservative debt, resilient" },
      { id: "proj",    name: "Projection realism",      hint: "1 = hockey stick with no basis · 5 = conservative assumptions you can defend" },
    ]},
  { id: "terms", name: "Deal Terms & Structure", blurb: "A great business at bad terms is a bad deal.",
    criteria: [
      { id: "price",   name: "Valuation / price",       hint: "1 = priced for perfection vs comps · 5 = attractive price with margin of safety" },
      { id: "downside",name: "Downside protection",     hint: "1 = total-loss exposure · 5 = collateral, preference, or structure that protects capital" },
      { id: "exit",    name: "Liquidity & exit path",   hint: "1 = no plausible exit, or a lock-up longer than your horizon · 5 = clear, realistic exit within your time horizon" },
      { id: "align",   name: "Alignment of incentives", hint: "1 = sponsor wins on structure even if you lose · 5 = sponsor mainly paid when you are (co-invest, carry, clawbacks)" },
      { id: "fees",    name: "Fees & cost drag",        hint: "1 = layered fees, carry, and promote skim most of the upside · 5 = lean fee load; you keep the bulk of the return net of everything" },
      { id: "gov",     name: "Conflicts & governance",  hint: "1 = related-party deals, sponsor's other funds paid first, little oversight · 5 = arm's-length, clean governance, real information and control rights" },
    ]},
  { id: "risk", name: "Risk", blurb: "What kills this deal, and how likely is it?",
    criteria: [
      { id: "keyman",  name: "Key-person risk",         hint: "1 = whole thing depends on one person · 5 = survives losing any one person" },
      { id: "conc",    name: "Concentration risk",      hint: "1 = one customer/supplier/tenant is most of it · 5 = well diversified" },
      { id: "reg",     name: "Regulatory & legal",      hint: "1 = open legal, regulatory, or reputational/headline exposure · 5 = clean legally and reputationally, unlikely to change" },
      { id: "exec",    name: "Execution complexity",    hint: "1 = many hard things must all go right · 5 = simple plan with few moving parts" },
    ]},
  { id: "fit", name: "Fit With Your Mandate", blurb: "The deal can be good and still wrong for you.",
    criteria: [
      { id: "size",    name: "Check size & allocation", hint: "1 = oversized bet for your portfolio · 5 = comfortable position size" },
      { id: "time",    name: "Time & attention",        hint: "1 = demands time you don't have · 5 = fits your capacity" },
      { id: "comp",    name: "Circle of competence",    hint: "1 = you can't verify the claims · 5 = you understand it well enough to add value" },
      { id: "sleep",   name: "Sleep-at-night factor",   hint: "1 = would keep you up at night · 5 = comfortable holding through bad news" },
      { id: "lockup",  name: "Liquidity & lock-up fit", hint: "1 = capital locked far beyond your horizon, or gates/capital calls you can't meet · 5 = lock-up and cash-flow timing fit your needs" },
      { id: "tax",     name: "Tax efficiency & structure", hint: "1 = tax-inefficient structure, messy K-1/UBTI, weak after-tax return · 5 = clean, tax-efficient structure for your situation" },
    ]},
];

const DEAL_TYPES = [
  { id: "operating",  label: "Buy a business (full purchase)",       weights: { people: 25, business: 20, financials: 20, terms: 15, risk: 10, fit: 10 } },
  { id: "equity",     label: "Stake in a company (% ownership)",     weights: { people: 25, business: 20, financials: 15, terms: 20, risk: 10, fit: 10 } },
  { id: "realestate", label: "Real estate",                          weights: { people: 20, business: 15, financials: 20, terms: 25, risk: 10, fit: 10 } },
  { id: "startup",    label: "Startup / angel",                      weights: { people: 30, business: 25, financials: 10, terms: 15, risk: 10, fit: 10 } },
  { id: "fund",       label: "Fund / syndicate",                     weights: { people: 30, business: 10, financials: 15, terms: 25, risk: 10, fit: 10 } },
  { id: "other",      label: "Other",                                weights: { people: 20, business: 20, financials: 20, terms: 15, risk: 15, fit: 10 } },
];

const RED_FLAGS = [
  { id: "guaranteed", label: "Returns described as guaranteed, safe, or \"can't lose\"" },
  { id: "pressure",   label: "Pressure to commit fast — artificial deadline or \"spots filling up\"" },
  { id: "nofin",      label: "Financials unavailable, unaudited, or don't reconcile" },
  { id: "history",    label: "Sponsor has lawsuits, fraud history, or undisclosed failed ventures" },
  { id: "opaque",     label: "Can't clearly explain how the money is actually made" },
  { id: "waterfall",  label: "Your capital pays earlier investors or sponsor fees before the business" },
  { id: "nodocs",     label: "No clean legal docs — handshake terms or shifting paperwork" },
  { id: "refs",       label: "Every reference was supplied by the sponsor (none independent)" },
];

const STAGES = ["Screening", "Diligence", "Declined", "Invested"];
// "Passed" (older label, ambiguous — read as "passed the test") migrates to "Declined".
const STAGE_ALIASES = { "Passed": "Declined" };
const normalizeStage = s => STAGE_ALIASES[s] || (STAGES.includes(s) ? s : "Screening");

// verdict = headline label; mean = plain one-liner for the grade legend. "Walk away"
// (not "Pass") is deliberate: a low grade means decline the deal, not "passed the test".
const GRADE_BANDS = [
  { min: 80, letter: "A", verdict: "Strong",    mean: "Invest-worthy — do full diligence", advice: "Proceed to full diligence — verify the claims behind the high scores." },
  { min: 65, letter: "B", verdict: "Promising", mean: "Promising — worth a closer look",   advice: "Worth diligence — focus on the weakest categories." },
  { min: 50, letter: "C", verdict: "Mixed",     mean: "Mixed — proceed only with caution", advice: "Only proceed if the top risks can be resolved on paper first." },
  { min: 35, letter: "D", verdict: "Weak",      mean: "Weak — probably a no",              advice: "Probably a no — the burden of proof is now on the deal." },
  { min: 0,  letter: "F", verdict: "Walk away", mean: "Walk away — decline the deal",       advice: "Walk away — decline the deal. Capital preservation comes first." },
];

const CRIT_KEYS = CATEGORIES.flatMap(c => c.criteria.map(x => c.id + "." + x.id));

/* Demo mode: opening the app with ?demo=1 seeds these sample deals so someone can
   see real reports without pasting anything. The plain link never touches them. */

/* ================= Storage (IndexedDB) ================= */

let _db = null;
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("deal-room", 2);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains("deals")) db.createObjectStore("deals", { keyPath: "id" });
      if (!db.objectStoreNames.contains("files")) db.createObjectStore("files", { keyPath: "id" });
      if (!db.objectStoreNames.contains("meta"))  db.createObjectStore("meta",  { keyPath: "k" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function tx(store, mode, fn) {
  return new Promise((resolve, reject) => {
    const t = _db.transaction(store, mode);
    const req = fn(t.objectStore(store));
    t.oncomplete = () => resolve(req ? req.result : undefined);
    t.onerror = () => reject(t.error);
  });
}
const dbPut    = (store, val) => tx(store, "readwrite", s => s.put(val));
const dbDelete = (store, key) => tx(store, "readwrite", s => s.delete(key));
const dbAll    = (store)      => tx(store, "readonly",  s => s.getAll());

/* ================= Encryption =================
   Envelope scheme: the password derives a wrapping key (PBKDF2) that unwraps a
   random per-vault master key (AES-GCM). Every deal and file is encrypted with
   the master key. The master key lives only in memory (masterKey) — never on
   disk in the clear, never persisted — so locking or reloading re-requires the
   password. Changing the password only re-wraps the master key, not the data.
   IndexedDB stores typed arrays / ArrayBuffers natively, so ciphertext is kept
   as { iv, ct } with no base64 round-trip. */

const te = new TextEncoder(), td = new TextDecoder();
const PBKDF2_ITERS = 600000;      // iteration count for NEW vaults (OWASP 2023 guidance)
const PBKDF2_LEGACY = 250000;     // fallback for a vault that predates the stored iters field
let masterKey = null;     // CryptoKey (AES-GCM), in-memory only; null ⇒ locked
let vaultExists = false;

const cryptoOK = () => !!(window.crypto && crypto.subtle && crypto.subtle.deriveKey);
const randBytes = n => crypto.getRandomValues(new Uint8Array(n));
const getVault = () => tx("meta", "readonly",  s => s.get("vault"));
const putVault = v  => tx("meta", "readwrite", s => s.put(v));

// iters comes FROM the vault on unlock, so raising PBKDF2_ITERS never locks out
// an existing vault — its key is still derived with the count it was created at.
async function deriveWrapKey(password, salt, iters) {
  const base = await crypto.subtle.importKey("raw", te.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: iters, hash: "SHA-256" },
    base, { name: "AES-GCM", length: 256 }, false, ["wrapKey", "unwrapKey"]);
}
async function createVault(password) {
  const salt = randBytes(16), wrapIv = randBytes(12);
  const wrapKey = await deriveWrapKey(password, salt, PBKDF2_ITERS);
  const mk = await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
  const wrapped = await crypto.subtle.wrapKey("raw", mk, wrapKey, { name: "AES-GCM", iv: wrapIv });
  await putVault({ k: "vault", salt, wrapIv, wrapped, iters: PBKDF2_ITERS });
  masterKey = mk; vaultExists = true;
}
async function unlockVault(password) {
  const v = await getVault();
  if (!v) throw new Error("no vault");
  const wrapKey = await deriveWrapKey(password, v.salt, v.iters || PBKDF2_LEGACY);
  // A wrong password fails GCM authentication and unwrapKey throws — that is the check.
  masterKey = await crypto.subtle.unwrapKey(
    "raw", v.wrapped, wrapKey, { name: "AES-GCM", iv: v.wrapIv },
    { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
}
async function changePassword(currentPw, newPw) {
  const v = await getVault();
  const curWrap = await deriveWrapKey(currentPw, v.salt, v.iters || PBKDF2_LEGACY);
  // Verify the current password by actually unwrapping (throws if wrong).
  const mk = await crypto.subtle.unwrapKey(
    "raw", v.wrapped, curWrap, { name: "AES-GCM", iv: v.wrapIv },
    { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
  const salt = randBytes(16), wrapIv = randBytes(12);
  const newWrap = await deriveWrapKey(newPw, salt, PBKDF2_ITERS);   // re-wrap upgrades the KDF too
  const wrapped = await crypto.subtle.wrapKey("raw", mk, newWrap, { name: "AES-GCM", iv: wrapIv });
  await putVault({ k: "vault", salt, wrapIv, wrapped, iters: PBKDF2_ITERS });
  masterKey = mk;
}

/* ---- unlock without typing: trusted device + passkey (Face ID / fingerprint) ----
   Trusted device stores the master CryptoKey itself in IndexedDB so the app opens
   without the password; protection on that device becomes the phone/computer lock.
   Passkey wraps the master key with a secret only released after biometric check
   (WebAuthn PRF). The password always remains a fallback; Lock clears device trust. */
async function trustDevice() {
  try {
    await tx("meta", "readwrite", s => s.put({ k: "trusted", key: masterKey, at: Date.now() }));
    deviceTrusted = true;
  } catch { /* storage refused the key — stay password-only */ }
}
async function untrustDevice() {
  await dbDelete("meta", "trusted");
  deviceTrusted = false;
}
async function enrollPasskey() {
  if (!masterKey) return;
  if (!window.PublicKeyCredential || !navigator.credentials || !location.hostname) {
    toast("Passkeys aren't supported in this browser"); return;
  }
  try {
    const prfSalt = randBytes(32);
    const cred = await navigator.credentials.create({ publicKey: {
      rp: { name: "Deal Room", id: location.hostname },
      user: { id: randBytes(16), name: "Deal Room vault", displayName: "Deal Room vault" },
      challenge: randBytes(32),
      pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
      authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required", residentKey: "preferred" },
      extensions: { prf: { eval: { first: prfSalt } } },
    }});
    const ext = cred.getClientExtensionResults();
    let prfOut = ext.prf && ext.prf.results && ext.prf.results.first;
    if (!prfOut && !(ext.prf && ext.prf.enabled)) {
      toast("This device's passkeys can't unlock a vault (no PRF support)"); return;
    }
    if (!prfOut) {
      const assertion = await navigator.credentials.get({ publicKey: {
        challenge: randBytes(32),
        allowCredentials: [{ type: "public-key", id: cred.rawId }],
        userVerification: "required",
        extensions: { prf: { eval: { first: prfSalt } } },
      }});
      prfOut = assertion.getClientExtensionResults().prf?.results?.first;
    }
    if (!prfOut) { toast("Couldn't finish Face ID setup — use the password for now"); return; }
    const kek = await crypto.subtle.importKey("raw", prfOut, { name: "AES-GCM" }, false, ["wrapKey"]);
    const iv = randBytes(12);
    const wrapped = await crypto.subtle.wrapKey("raw", masterKey, kek, { name: "AES-GCM", iv });
    await tx("meta", "readwrite", s => s.put({ k: "passkey", credId: cred.rawId, prfSalt, wrapped, iv }));
    passkeyEnrolled = true;
    renderSettings();
    toast("Face ID / passkey unlock is set up");
  } catch { toast("Face ID setup was cancelled or isn't available here"); }
}
async function removePasskey() {
  await dbDelete("meta", "passkey");
  passkeyEnrolled = false;
  renderSettings();
  toast("Face ID / passkey unlock removed");
}
async function passkeyUnlock() {
  const rec = await tx("meta", "readonly", s => s.get("passkey"));
  if (!rec) return;
  try {
    const assertion = await navigator.credentials.get({ publicKey: {
      challenge: randBytes(32),
      allowCredentials: [{ type: "public-key", id: rec.credId }],
      userVerification: "required",
      extensions: { prf: { eval: { first: rec.prfSalt } } },
    }});
    const prfOut = assertion.getClientExtensionResults().prf?.results?.first;
    if (!prfOut) throw new Error("no prf");
    const kek = await crypto.subtle.importKey("raw", prfOut, { name: "AES-GCM" }, false, ["unwrapKey"]);
    masterKey = await crypto.subtle.unwrapKey("raw", rec.wrapped, kek, { name: "AES-GCM", iv: rec.iv },
      { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
    deals = await loadDeals();
    const box = document.getElementById("trust-device");
    if (box && box.checked) await trustDevice();
    go("pipeline");
  } catch { toast("Face ID unlock didn't work — use your password"); }
}

async function encObj(obj) {
  const iv = randBytes(12);
  const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, masterKey, te.encode(JSON.stringify(obj)));
  return { iv, ct };
}
async function decObj(enc) {
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: enc.iv }, masterKey, enc.ct);
  return JSON.parse(td.decode(pt));
}
async function encBlob(blob) {
  const iv = randBytes(12);
  const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, masterKey, await blob.arrayBuffer());
  return { iv, ct };
}
async function decBlob(enc, type) {
  const buf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: enc.iv }, masterKey, enc.ct);
  return new Blob([buf], { type: type || "application/octet-stream" });
}

/* ---- crypto-aware storage: records are { id, enc } / { id, dealId, meta, blob } ---- */
async function putDeal(deal) { return dbPut("deals", { id: deal.id, enc: await encObj(deal) }); }
async function loadDeals() {
  const out = [];
  for (const r of await dbAll("deals")) {
    if (!r || !r.enc) continue;
    try { const d = await decObj(r.enc); d.stage = normalizeStage(d.stage); out.push(d); }
    catch { /* not decryptable with this key — skip */ }
  }
  return out;
}
async function putFile(dealId, file) {
  const meta = await encObj({ name: file.name, type: file.type, size: file.size, addedAt: Date.now() });
  const blob = await encBlob(file);
  return dbPut("files", { id: uid(), dealId, meta, blob });
}
const fileRowsForDeal = async dealId => (await dbAll("files")).filter(r => r.dealId === dealId);
async function loadFileMetas(dealId) {
  const out = [];
  for (const r of await fileRowsForDeal(dealId)) {
    try { out.push({ id: r.id, dealId: r.dealId, ...(await decObj(r.meta)) }); } catch {}
  }
  return out.sort((a, b) => b.addedAt - a.addedAt);
}
async function loadFileFull(id) {
  const r = (await dbAll("files")).find(x => x.id === id);
  if (!r) return null;
  const m = await decObj(r.meta);
  return { id: r.id, name: m.name, type: m.type, blob: await decBlob(r.blob, m.type) };
}

/* One-time migration: encrypt any v1 plaintext records once a master key exists. */
async function migrateLegacy() {
  for (const r of await dbAll("deals")) {
    if (r && !r.enc && r.name !== undefined) await dbPut("deals", { id: r.id, enc: await encObj(r) });
  }
  for (const r of await dbAll("files")) {
    if (r && !r.meta && r.name !== undefined) {
      const meta = await encObj({ name: r.name, type: r.type, size: r.size, addedAt: r.addedAt || Date.now() });
      await dbPut("files", { id: r.id, dealId: r.dealId, meta, blob: await encBlob(r.blob) });
    }
  }
}

/* ================= State & helpers ================= */

let deals = [];
let view = "pipeline";
let currentDealId = null;
let saveTimer = null;
let demo = false;   // in-memory sample-data mode: no password, nothing persisted
let deviceTrusted = false;    // a "keep me unlocked" copy of the master key is stored on this device
let passkeyEnrolled = false;  // a passkey-wrapped copy of the master key exists (Face ID / fingerprint unlock)

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
// Ids get interpolated into inline handlers, so an imported one must match the safe

const safeId = id => (typeof id === "string" && /^[a-z0-9]+$/i.test(id)) ? id : uid();

function gradeFromAnalysis(deal) {
  const a = deal.analysis;
  if (!a || !a.data) return null;
  const w = weightsFor(deal);
  const byCat = {};
  for (const s of a.data.suggested_scores || []) {
    if (!CRIT_KEYS.includes(s.criterion)) continue;
    const v = Number(s.score);
    if (!(v >= 1 && v <= 5)) continue;
    const catId = s.criterion.split(".")[0];
    (byCat[catId] || (byCat[catId] = { sum: 0, n: 0 }));
    byCat[catId].sum += v; byCat[catId].n++;
  }
  const flags = (a.data.red_flags || []).filter(f => RED_FLAGS.some(x => x.id === f.id));
  const flagged = flags.length > 0;
  let wSum = 0, wUsed = 0;
  for (const cat of CATEGORIES) {
    const b = byCat[cat.id];
    if (b && b.n) { wSum += (b.sum / b.n) * w[cat.id]; wUsed += w[cat.id]; }
  }

  // How solid is this reading? Confidence = evidence quality of the scores;
  // coverage = how much of the scorecard is actually backed by evidence.
  // These do NOT move the numeric grade (the prompt already caps unverified
  // scores at 3) — they tell you how much to trust it.
  const CONF_W = { verified: 1, partial: 0.5, claim: 0 };
  const valid = (a.data.suggested_scores || [])
    .filter(s => CRIT_KEYS.includes(s.criterion) && Number(s.score) >= 1 && Number(s.score) <= 5);
  let cSum = 0;
  for (const s of valid) cSum += (CONF_W[s.confidence] ?? 0.5);
  const confidence = valid.length ? Math.round(cSum / valid.length * 100) : null;
  const critCoverage = Math.round(valid.length / CRIT_KEYS.length * 100);
  const catCoverage = Object.keys(byCat).length;   // of CATEGORIES.length (6)
  let reliability = "Solid";
  if (catCoverage <= 2 || critCoverage < 30 || (confidence !== null && confidence < 40)) reliability = "Provisional";
  else if ((confidence !== null && confidence < 70) || critCoverage < 60) reliability = "Moderate";

  const meta = { confidence, critCoverage, catCoverage, catTotal: CATEGORIES.length, reliability };
  if (!wUsed) return { score: null, letter: null, flagged, flags, cats: byCat, ...meta };
  let score = Math.round(((wSum / wUsed) - 1) / 4 * 100);
  if (flagged && score > 49) score = 49;
  const band = GRADE_BANDS.find(b => score >= b.min);
  return { score, letter: band.letter, verdict: band.verdict, advice: band.advice, flagged, flags, cats: byCat, ...meta };
}

function extractAnalysis(raw) {
  let jsonText = null;
  const fence = raw.match(/```json\s*([\s\S]*?)```/i) || raw.match(/```\s*([\s\S]*?)```/);
  if (fence) jsonText = fence[1];
  else { const s = raw.indexOf("{"), e = raw.lastIndexOf("}"); if (s >= 0 && e > s) jsonText = raw.slice(s, e + 1); }
  if (!jsonText) return null;
  try {
    const o = JSON.parse(jsonText);
    if (o && typeof o === "object" && (o.summary !== undefined || Array.isArray(o.suggested_scores))) return normalizeAnalysis(o);
  } catch {}
  return null;
}
const CONF_LEVELS = ["verified", "partial", "claim"];
function normalizeUpside(u) {
  if (!u || typeof u !== "object") return null;
  const pick = (v, allowed) => allowed.includes(v) ? v : null;
  const out = {
    potential: pick(u.potential, ["high", "moderate", "low"]),
    asymmetry: pick(u.asymmetry, ["favorable", "balanced", "poor"]),
    base: String(u.base || ""), bull: String(u.bull || ""), bear: String(u.bear || ""),
    note: String(u.note || ""),
  };
  if (!out.potential && !out.asymmetry && !out.base && !out.bull && !out.bear && !out.note) return null;
  return out;
}
function normalizeAnalysis(o) {
  const arr = x => Array.isArray(x) ? x : [];
  return {
    summary: String(o.summary || ""),
    key_facts: arr(o.key_facts).filter(x => x && x.label).map(x => ({ label: String(x.label), value: String(x.value ?? "") })),
    suggested_scores: arr(o.suggested_scores).filter(x => x && CRIT_KEYS.includes(x.criterion) && Number(x.score) >= 1 && Number(x.score) <= 5)
      .map(x => ({ criterion: x.criterion, score: Number(x.score), confidence: CONF_LEVELS.includes(x.confidence) ? x.confidence : "partial", rationale: String(x.rationale || "") })),
    red_flags: arr(o.red_flags).filter(x => x && RED_FLAGS.some(f => f.id === x.id)).map(x => ({ id: x.id, reason: String(x.reason || "") })),
    upside: normalizeUpside(o.upside),
    missing_info: arr(o.missing_info).map(String),
    diligence_questions: arr(o.diligence_questions).map(String),
    overall_take: String(o.overall_take || ""),
  };
}
// Sanitize a deal from an untrusted backup file: a crafted analysis (e.g. a
// non-array suggested_scores) would otherwise throw in gradeFromAnalysis and

function normalizeImportedDeal(d) {
  const o = (d && typeof d === "object") ? d : {};
  const now = Date.now();

    summary: String(o.summary ?? ""), callNotes: String(o.callNotes ?? ""), notes: String(o.notes ?? ""),
    links: (Array.isArray(o.links) ? o.links : []).map(safeUrl).filter(Boolean),

}

    deals = await loadDeals();
    offerCredentialSave(p1);
    go("pipeline");
    toast("Encrypted — you're all set");
  } catch { err.innerHTML = gateErr("Couldn't set up encryption here."); }
}
async function doUnlock() {
  const el = document.getElementById("pw1"), err = document.getElementById("pw-err");
  const raw = el.value;
  if (!raw) return;
  // Mobile keyboards and autofill sometimes add stray whitespace; try the exact
  // entry first, then the trimmed variant, so a space never reads as "wrong password".
  let used = null;
  for (const pw of new Set([raw, raw.trim()])) {
    if (!pw) continue;
    try { await unlockVault(pw); used = pw; break; } catch {}
  }
  if (!used) {
    err.innerHTML = gateErr("Wrong password.");
    el.value = ""; el.focus();
    return;
  }
  deals = await loadDeals();
  const box = document.getElementById("trust-device");
  if (box && box.checked) await trustDevice();
  offerCredentialSave(used);
  go("pipeline");
}
async function lockNow() {
  await flushSaves();      // finish any pending encrypted writes before dropping the key
  await untrustDevice();   // locking means "require the password again" — on this device too
  masterKey = null;
  deals = []; currentDealId = null; view = "pipeline";
  renderGate();
}
function gradePill(g) {
  if (!g || g.score === null) return `<span class="grade-pill g-none">—</span>`;
  return `<span class="grade-pill g-${g.letter}" title="${g.score}/100">${g.letter}</span>`;
}

const REL_COLOR = { Solid: "var(--good)", Moderate: "var(--warning)", Provisional: "var(--serious)" };
function reliabilityStrip(g) {
  if (g.score === null) return "";
  const conf = g.confidence !== null ? `Confidence ${g.confidence}%` : "Confidence n/a";
  const cov = `Coverage ${g.catCoverage}/${g.catTotal} categories (${g.critCoverage}%)`;
  const note = g.reliability === "Provisional"
    ? `<p class="hint" style="margin:.3rem 0 0;">Treat this as a provisional read — key parts of the checklist aren't yet backed by evidence. Add more materials to firm it up.</p>`
    : "";
  return `<div class="reliability">
      <span class="rel-badge" style="color:${REL_COLOR[g.reliability]}; border-color:${REL_COLOR[g.reliability]}">Reading: ${g.reliability}</span>
      <span class="hint">${conf} · ${cov}</span>
    </div>${note}`;
}
function gradeKey() {
  return `<details class="grade-key"><summary>What does this grade mean?</summary>
    ${GRADE_BANDS.map(b => `<div class="gk-row"><span class="dp-pill g-${b.letter}">${b.letter}</span> <span>${b.min}+ · ${esc(b.mean)}</span></div>`).join("")}
    <p class="hint" style="margin:.5rem 0 0;">Green means worth pursuing, red means stay away. In deal-vetting, to <b>“pass”</b> means to <b>decline</b> a deal — a low grade is the deal failing the checklist, never “passing” it.</p>
  </details>`;
}
function analysisBanner(d) {
  const g = gradeFromAnalysis(d);
  if (!g || (g.score === null && !g.flagged)) return "";
  const flagNote = g.flagged ? `<div class="flagbox"><b>⚠ Deal-killer flagged.</b> Grade capped at 49 — the family-office default on a red flag is to <b>walk away</b>, no matter how good the story is.</div>` : "";
  return `<div class="verdict">${gradePill(g)}
    <div class="v-text"><b>${g.score !== null ? `${g.score}/100 — ${g.verdict}` : "Red flag raised"}</b>
    <p class="hint">${g.score !== null ? g.advice : ""}</p></div>
  </div>${reliabilityStrip(g)}${flagNote}${gradeKey()}`;
}
function upsideCard(r) {
  const u = r.upside;
  if (!u) return "";
  const potMap = { high: ["High", "var(--good)"], moderate: ["Moderate", "var(--warning)"], low: ["Low", "var(--muted)"] };
  const asymMap = { favorable: ["Favorable", "var(--good)"], balanced: ["Balanced", "var(--warning)"], poor: ["Poor", "var(--critical)"] };
  const pill = (label, m) => m ? `<span class="chip" style="color:${m[1]}; border-color:${m[1]}">${label}: ${m[0]}</span>` : "";
  const scen = (label, txt) => txt ? `<tr><td style="white-space:nowrap;"><b>${label}</b></td><td>${esc(txt)}</td></tr>` : "";
  const rows = scen("Base", u.base) + scen("Bull", u.bull) + scen("Bear", u.bear);
  return `<div class="card"><h2>Upside &amp; asymmetry</h2>
    <div class="row" style="margin-bottom:.6rem;">${pill("Upside", potMap[u.potential])}${pill("Risk/reward", asymMap[u.asymmetry])}</div>
    ${rows ? `<div style="overflow-x:auto;"><table class="cmp">${rows}</table></div>` : ""}
    ${u.note ? `<p class="hint" style="margin:.6rem 0 0; white-space:pre-wrap;">${esc(u.note)}</p>` : ""}
  </div>`;
}
const CONF_TAG = { verified: ["verified", "var(--good)"], partial: ["partial", "var(--warning)"], claim: ["claim", "var(--serious)"] };
function confTag(c) {
  const m = CONF_TAG[c]; if (!m) return "";
  return `<span class="chip" style="color:${m[1]}; border-color:${m[1]}" title="Evidence quality">${m[0]}</span>`;
}
function critLabel(key) {
  const [catId, critId] = key.split(".");
  const cat = CATEGORIES.find(c => c.id === catId);
  const crit = cat && cat.criteria.find(c => c.id === critId);
  return crit ? `${esc(crit.name)} <span class="hint">· ${esc(cat.name)}</span>` : esc(key);
}
function reportCard(d) {
  const a = d.analysis;
  if (!a || !a.data) return "";
  const r = a.data, g = gradeFromAnalysis(d);
  const when = new Date(a.at).toLocaleString();
  let html = `<div class="card">
    ${analysisBanner(d)}
    <h2>Report</h2>
    <p class="hint" style="margin-top:0;">Scored by your Claude · ${esc(when)} — this is Claude's read of the materials, not investment advice.</p>
    <p style="white-space:pre-wrap;">${esc(r.summary)}</p>
    ${r.key_facts && r.key_facts.length ? `<div style="overflow-x:auto;"><table class="cmp">
      ${r.key_facts.map(f => `<tr><td style="white-space:nowrap;"><b>${esc(f.label)}</b></td><td>${esc(f.value)}</td></tr>`).join("")}
    </table></div>` : ""}
  </div>`;
  html += upsideCard(r);

  const scores = (r.suggested_scores || []).filter(s => CRIT_KEYS.includes(s.criterion));
  if (g && g.cats && Object.keys(g.cats).length) {
    html += `<div class="card"><h2>Category scores</h2>` + CATEGORIES.map(cat => {
      const b = g.cats[cat.id];
      const pct = b && b.n ? ((b.sum / b.n - 1) / 4 * 100) : null;
      return `<div class="meter"><span class="m-label">${cat.name}</span>
        <span class="m-track"><span class="m-fill" style="width:${pct ?? 0}%"></span></span>
        <span class="m-val">${pct !== null ? Math.round(pct) : "—"}</span></div>`;
    }).join("") + `</div>`;
  }
  if (scores.length) {
    html += `<div class="card"><h2>Scores &amp; evidence</h2>` +
      scores.map(s => `<div class="crit"><div class="crit-label">${critLabel(s.criterion)}<span class="crit-hint">${esc(s.rationale)}</span></div>${confTag(s.confidence)}<span class="chip">${Number(s.score)}/5</span></div>`).join("") + `</div>`;
  }
  const flags = (r.red_flags || []).filter(f => RED_FLAGS.some(x => x.id === f.id));
  if (flags.length) {
    html += `<div class="card"><h2 style="color:var(--critical)">Red flags spotted</h2>` +
      flags.map(f => { const def = RED_FLAGS.find(x => x.id === f.id); return `<div class="crit"><div class="crit-label"><b>${esc(def.label)}</b><span class="crit-hint">${esc(f.reason)}</span></div></div>`; }).join("") + `</div>`;
  }
  if ((r.missing_info && r.missing_info.length) || (r.diligence_questions && r.diligence_questions.length)) {
    html += `<div class="card"><h2>Before any money moves</h2>`;
    if (r.missing_info && r.missing_info.length) html += `<h3>Missing from the materials</h3><ul>` + r.missing_info.map(m => `<li>${esc(m)}</li>`).join("") + `</ul>`;
    if (r.diligence_questions && r.diligence_questions.length) html += `<h3>Ask the sponsor</h3><ul>` + r.diligence_questions.map(q => `<li>${esc(q)}</li>`).join("") + `</ul>`;
    html += `</div>`;
  }
  if (r.overall_take) html += `<div class="card"><h2>Analyst's take</h2><p style="margin:0; white-space:pre-wrap;">${esc(r.overall_take)}</p></div>`;
  return html;
}

/* ---- files handling ---- */
function dzOver(e) { e.preventDefault(); e.currentTarget.classList.add("drag"); }
function dzLeave(e) { e.currentTarget.classList.remove("drag"); }
function dzDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove("drag");
  if (e.dataTransfer && e.dataTransfer.files.length) storeFiles(e.dataTransfer.files);
}
async function storeFiles(fileList) {
  const d = getDeal(currentDealId);
  if (!d) return;
  if (demo) { toast("Set up the app to add your own files"); return; }
  let added = 0;
  for (const file of fileList) {
    if (file.size > 25 * 1048576) { toast(`${file.name} is over 25 MB — skipped`); continue; }
    await putFile(d.id, file);
    added++;
  }
  if (added) toast(added + " file" + (added > 1 ? "s" : "") + " added");
  renderDeal();
}
document.getElementById("fileAttach").addEventListener("change", e => {
  if (e.target.files.length) storeFiles(e.target.files);
  e.target.value = "";
});
// HTML/SVG/XHTML run script in OUR origin when opened as a blob: URL — and these
// files come from sponsors we're vetting. Download those instead of viewing inline.
function isRiskyFileType(type, name) {
  return /^(text\/html|image\/svg\+xml|application\/xhtml\+xml)/i.test(type || "")
      || /\.(html?|svg|xhtml)$/i.test(name || "");
}
async function openFile(id) {
  const f = await loadFileFull(id);
  if (!f) return;
  const url = URL.createObjectURL(f.blob);
  if (isRiskyFileType(f.type, f.name)) {
    const a = document.createElement("a");
    a.href = url; a.download = f.name || "file";
    a.click();
    toast("Downloaded — open it outside the app for safety");
  } else {
    window.open(url, "_blank", "noopener");   // noopener: opened file can't reach back via window.opener
  }
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}
async function removeFile(id) {
  if (!confirm("Remove this file?")) return;
  await dbDelete("files", id);
  renderDeal();
}
function addLink() {
  const d = getDeal(currentDealId);
  if (!d) return;
  const input = document.getElementById("link-input");
  const url = safeUrl(input && input.value);
  if (!url) { toast("That doesn't look like a web link"); return; }
  if (!Array.isArray(d.links)) d.links = [];
  if (d.links.includes(url)) { toast("That link's already added"); input.value = ""; return; }
  d.links.push(url);
  saveDeal(d, true);
  renderDeal();
  document.getElementById("link-input")?.focus();
  toast("Link added");
}
function removeLink(i) {
  const d = getDeal(currentDealId);
  if (!d || !Array.isArray(d.links)) return;
  d.links.splice(i, 1);
  saveDeal(d, true);

  const d = getDeal(id);

  if (!demo) {   // demo is in-memory only — never touch storage
    for (const r of await fileRowsForDeal(id)) await dbDelete("files", r.id);
    await dbDelete("deals", id);

      <h3>Unlock without typing</h3>
      <p class="hint" style="margin-top:0;">Stay unlocked on this device: <b>${deviceTrusted ? "on" : "off"}</b>${deviceTrusted ? " — tap Lock to turn it off and require the password again." : " — tick “Keep me unlocked on this device” next time you unlock."}</p>
      <div class="row" style="margin-bottom:.4rem;">
        ${passkeyEnrolled
          ? `<button class="btn" onclick="removePasskey()">Remove Face ID / passkey unlock</button>`
          : `<button class="btn" onclick="enrollPasskey()">Set up Face ID / passkey unlock</button>`}
      </div>
      <p class="hint">Face ID / passkey unlocks the vault with your face or fingerprint instead of the password (needs a recent phone or browser). Your password always works as the fallback. Either shortcut means the data is only as protected as this device's own lock.</p>
      <h3>Change password</h3>
      <form onsubmit="event.preventDefault(); doChangePw();">
        <input type="text" class="pm-user" name="username" value="Deal Room" autocomplete="username" aria-hidden="true" tabindex="-1" readonly>
        <label class="field"><span>Current password</span>
          <input type="password" id="cp-cur" autocomplete="current-password" autocapitalize="none" autocorrect="off" spellcheck="false"></label>
        <label class="field"><span>New password <a href="#" onclick="togglePw('cp-new',this);return false;" style="float:right; color:var(--muted); font-weight:400;">show</a></span>
          <input type="password" id="cp-new" name="new-password" autocomplete="new-password" autocapitalize="none" autocorrect="off" spellcheck="false"></label>
        <label class="field"><span>Confirm new password</span>
          <input type="password" id="cp-new2" autocomplete="new-password" autocapitalize="none" autocorrect="off" spellcheck="false"></label>
        <div id="cp-err"></div>
        <button type="submit" class="btn primary">Update password</button>
      </form>
      <p class="hint" style="margin-bottom:0;">There's no reset — if you forget it, the data can't be recovered. Keep a current backup as your recovery copy.</p>
    </div>
    <div class="card">
      <h2>How Deal Room works</h2>
      <p class="hint" style="margin-top:0;">A private workbench for vetting deals against the checklist prominent family offices use. There's no account, no server, and no AI cost — the analysis runs inside <b>your own Claude</b>. Your deals and files stay in this browser, encrypted with your password.</p>
      <ol style="margin:0; padding-left:1.2rem; font-size:.9rem; line-height:1.6;">
        <li><b>New deal</b> → name it and pick a type (that sets the scorecard weighting).</li>
        <li><b>Add the raise files</b> — drop in the pitch deck, financials, or term sheet.</li>
        <li><b>Analyze with your Claude</b> → tap "Copy instructions &amp; open Claude", attach your file in Claude, and paste. Claude scores the deal like a family-office analyst and asks for anything it's missing.</li>
        <li><b>Save the result</b> (optional) → paste Claude's reply back to keep the scored report and A–F grade here.</li>
      </ol>
    </div>
    <div class="card">
      <h2>Three ways to use it</h2>
      <p class="hint" style="margin-top:0;">Same file, whatever's handy:</p>
      <ul style="margin:0; padding-left:1.2rem; font-size:.9rem; line-height:1.6;">
        <li><b>On your phone</b> — open it in your browser and use "Add to Home Screen"; it runs full-screen like an app. (Works best from a hosted link — ask whoever sent it.)</li>
        <li><b>On your computer</b> — just open the file in any browser. Works offline.</li>
        <li><b>Inside Claude</b> — drop the file into a Claude chat and ask it to open the Deal Room; Claude runs it in its browser.</li>
      </ul>
    </div>
    <div class="card">
      <h2>Run it from your own website (most private)</h2>
      <p class="hint" style="margin-top:0;">Want it to feel like your own private tool? Put this one file on a website you control and open that link — then it installs to your phone's home screen cleanly and lives at your own address.</p>
      <ul style="margin:0 0 .6rem; padding-left:1.2rem; font-size:.9rem; line-height:1.6;">
        <li>Upload <b>this single HTML file</b> to any web host — a free one like Cloudflare Pages, Netlify, or GitHub Pages, or a spare folder on a site/domain you already own.</li>
        <li>Open your link, then <b>Add to Home Screen</b>. Keep the link unlisted, or password-protect it, and it's yours alone.</li>
      </ul>
      <p class="hint" style="margin-bottom:0;">It stays just as private either way: the page is plain static HTML with no tracking and no accounts, your deals and files never leave your browser, and the only thing ever sent out is the file <i>you</i> choose to hand to your own Claude.</p>
    </div>
    <div class="card">
      <h2>Backup</h2>
      <div class="row">
        <button class="btn" onclick="exportBackup()">Export all deals</button>
        <button class="btn" onclick="document.getElementById('fileImportBackup').click()">Restore backup</button>
      </div>
      <p class="hint" style="margin-bottom:0;">Saves every deal, note, and saved report to one file (the attached raise files stay on-device — they aren't in the backup). This is also your <b>recovery copy</b>: if you ever forget your password, the encrypted on-device data can't be recovered, but a backup restores your deals into a fresh password. The backup file itself is <b>not encrypted</b> — store it somewhere safe.</p>
    </div>`;
}
async function doChangePw() {
  const cur = document.getElementById("cp-cur").value;
  const n1 = document.getElementById("cp-new").value, n2 = document.getElementById("cp-new2").value;
  const err = document.getElementById("cp-err");
  if (n1.length < 8) { err.innerHTML = gateErr("New password: at least 8 characters."); return; }
  if (n1 !== n1.trim()) { err.innerHTML = gateErr("Remove the space at the start or end of the new password."); return; }
  if (n1 !== n2)     { err.innerHTML = gateErr("New passwords don't match."); return; }
  try {
    try { await changePassword(cur, n1); }
    catch (e) { if (cur !== cur.trim() && cur.trim()) await changePassword(cur.trim(), n1); else throw e; }
    err.innerHTML = "";
    ["cp-cur", "cp-new", "cp-new2"].forEach(id => document.getElementById(id).value = "");
    offerCredentialSave(n1);
    toast("Password updated");
  } catch { err.innerHTML = gateErr("Current password is wrong."); }
}
function download(name, obj) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
function exportBackup() {
  download("deal-room-backup-" + new Date().toISOString().slice(0, 10) + ".json",
    { kind: "dealroom-backup", version: 2, exportedAt: Date.now(), deals });
  toast("Backup exported");
}
document.getElementById("fileImportBackup").addEventListener("change", async e => {
  const file = e.target.files[0];
  e.target.value = "";
  if (!file) return;
  try {
    const data = JSON.parse(await file.text());
    if (data.kind !== "dealroom-backup" || !Array.isArray(data.deals)) throw new Error("bad format");
    if (!confirm(`Restore ${data.deals.length} deal(s)? Deals with matching IDs will be overwritten.`)) return;
    for (const raw of data.deals) {
      const d = normalizeImportedDeal(raw);
      const i = deals.findIndex(x => x.id === d.id);
      if (i >= 0) deals[i] = d; else deals.push(d);
      await putDeal(d);
    }
    toast("Backup restored");
    go("pipeline");
  } catch {
    toast("Couldn't read that file — is it a Deal Room backup?");
  }
});

/* ================= Misc ================= */
async function copyText(text, okMsg) {
  try { await navigator.clipboard.writeText(text); toast(okMsg || "Copied"); return; }
  catch {}
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand("copy"); ta.remove();
    toast(okMsg || "Copied");
  } catch { toast("Couldn't copy — select the text manually"); }
}
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

/* ---- installable web-app manifest (self-contained, no separate files) ---- */
(function pwa() {
  try {
    const icon = "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='96' fill='#2a78d6'/><text x='256' y='340' font-family='system-ui,sans-serif' font-size='260' font-weight='700' fill='#fff' text-anchor='middle'>DR</text></svg>`);
    const manifest = {
      name: "Deal Room", short_name: "Deal Room",
      start_url: ".", scope: ".", display: "standalone",
      background_color: "#0d0d0d", theme_color: "#0d0d0d",
      icons: [{ src: icon, sizes: "any", type: "image/svg+xml", purpose: "any" }],
    };
    const url = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" }));
    const link = document.createElement("link");
    link.rel = "manifest"; link.href = url;
    document.head.appendChild(link);
  } catch {}
})();

/* ---- boot ---- */
(async function init() {
  try {
    _db = await openDB();
    vaultExists = !!(await getVault());
    passkeyEnrolled = !!(await tx("meta", "readonly", s => s.get("passkey")));
    const trusted = await tx("meta", "readonly", s => s.get("trusted"));
    if (DEMO_MODE) startDemo();   // ?demo=1 opens straight into the sample data
    else if (trusted && trusted.key && vaultExists) {
      // "Keep me unlocked on this device" — open straight into the pipeline
      masterKey = trusted.key;
      deviceTrusted = true;
      deals = await loadDeals();
      render();
    }
    else renderGate();            // otherwise set up a password on first run, or ask to unlock
  } catch (e) {
    app.innerHTML = `<div class="card">
      <h2>Storage unavailable</h2>
      <p>Deal Room saves your deals in this browser's local database (IndexedDB), but it isn't available right now.</p>
      <p class="hint">This usually means private/incognito mode, or opening the file in a browser that blocks local storage for files. Try a normal (non-private) window in Chrome, Edge, or Safari, or open it from a hosted link. Nothing was lost.</p>
    </div>`;
  }
})();
</script>
